<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mis Trabajos">
<title>Mis Trabajos</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8f7f4;
  --surface: #ffffff;
  --surface2: #f1efe8;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #5a5a5a;
  --text3: #999;
  --accent: #1a6b4a;
  --accent-light: #e8f5ee;
  --accent-mid: #2d9e6e;
  --amber: #b45309;
  --amber-light: #fef3c7;
  --red: #b91c1c;
  --red-light: #fee2e2;
  --blue: #1d4ed8;
  --blue-light: #dbeafe;
  --purple: #6d28d9;
  --purple-light: #ede9fe;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --font: 'DM Sans', sans-serif;
  --font-mono: 'DM Mono', monospace;
}
[data-theme="dark"] {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #162032;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.14);
  --text: #f1f5f9;
  --text2: #94a3b8;
  --text3: #475569;
  --accent: #34d399;
  --accent-light: #064e3b;
  --accent-mid: #10b981;
  --amber: #fbbf24;
  --amber-light: #451a03;
  --red: #f87171;
  --red-light: #450a0a;
  --blue: #60a5fa;
  --blue-light: #1e3a5f;
  --purple: #a78bfa;
  --purple-light: #2e1065;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;transition:background .2s,color .2s}
a{color:inherit;text-decoration:none}

/* LAYOUT */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:900px;margin:0 auto;padding:0 16px}

/* HEADER */
.header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;gap:12px;position:sticky;top:0;background:var(--bg);z-index:50;border-bottom:1px solid var(--border);margin-bottom:20px}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:36px;height:36px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.header-title{font-size:18px;font-weight:600;letter-spacing:-0.3px}
.header-subtitle{font-size:12px;color:var(--text3);font-family:var(--font-mono)}
.header-actions{display:flex;align-items:center;gap:8px}
.icon-btn{width:36px;height:36px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;flex-shrink:0}
.icon-btn:hover{background:var(--surface2);border-color:var(--border2)}
.icon-btn svg{width:18px;height:18px;stroke:var(--text2);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:all .15s}
.stat-value{font-size:26px;font-weight:600;letter-spacing:-0.5px;margin-bottom:2px;font-family:var(--font-mono)}
.stat-label{font-size:11px;color:var(--text2);font-weight:500;text-transform:uppercase;letter-spacing:.04em}
.stat.green .stat-value{color:var(--accent-mid)}
.stat.amber .stat-value{color:var(--amber)}
.stat.red .stat-value{color:var(--red)}

/* TOOLBAR */
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.toolbar input,.toolbar select{height:36px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color .15s}
.toolbar input:focus,.toolbar select:focus{border-color:var(--accent-mid)}
.toolbar input{flex:1;min-width:140px}
.btn-new{height:36px;padding:0 16px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;transition:opacity .15s;margin-left:auto}
.btn-new:hover{opacity:.88}
.btn-new svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}

/* TABLE */
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:24px}
.table-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:700px}
thead th{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--surface2)}
tbody tr.alert-row{border-left:3px solid var(--red)}
tbody td{padding:12px 14px;vertical-align:middle}
.td-project{font-weight:500;max-width:180px}
.td-client{color:var(--text2);font-size:12px;max-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-date{font-size:12px;color:var(--text2);font-family:var(--font-mono);white-space:nowrap}
.td-check{text-align:center;min-width:80px}
.check-wrap{display:flex;flex-direction:column;align-items:center;gap:2px}
.check-wrap input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--accent-mid)}
.check-date{font-size:10px;color:var(--text3);font-family:var(--font-mono);white-space:nowrap}
.td-note{font-size:12px;color:var(--text2);max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.td-actions{text-align:right;white-space:nowrap;display:flex;gap:4px;justify-content:flex-end}
.row-btn{background:none;border:none;cursor:pointer;color:var(--text2);padding:6px;border-radius:6px;transition:all .15s;display:inline-flex;align-items:center}
.row-btn:hover{color:var(--text);background:var(--surface2)}
.row-btn.del:hover{color:var(--red);background:var(--red-light)}
.row-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-pending{background:var(--surface2);color:var(--text2)}
.badge-quoted{background:var(--blue-light);color:var(--blue)}
.badge-invoiced{background:var(--purple-light);color:var(--purple)}
.badge-paid{background:var(--accent-light);color:var(--accent)}
.badge-unpaid{background:var(--red-light);color:var(--red)}

/* MONTH SEPARATOR */
.month-row td{background:var(--surface2);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:7px 14px;border-bottom:1px solid var(--border)}

/* EMPTY */
.empty{text-align:center;padding:48px 24px;color:var(--text3)}
.empty svg{width:40px;height:40px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;margin:0 auto 12px;display:block}
.empty p{font-size:14px}

/* MODAL OVERLAY */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:flex-end;justify-content:center;padding:0}
.modal-overlay.open{display:flex}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
.modal{background:var(--surface);width:100%;max-width:520px;border-radius:var(--radius) var(--radius) 0 0;padding:24px 20px;max-height:90vh;overflow-y:auto}
@media(min-width:600px){.modal{border-radius:var(--radius);padding:28px}}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:17px;font-weight:600;letter-spacing:-0.2px}
.modal-close{width:32px;height:32px;border:none;background:var(--surface2);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.modal-close svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{width:100%;padding:10px 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent-mid)}
.field textarea{resize:vertical;min-height:72px;line-height:1.5}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.btn-cancel{padding:10px 18px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:transparent;color:var(--text2);font-family:var(--font);font-size:14px;cursor:pointer;transition:all .15s}
.btn-cancel:hover{background:var(--surface2)}
.btn-save{padding:10px 22px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:14px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.88}

/* PANEL RESUMEN */
.panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:200;align-items:center;justify-content:center;padding:20px}
.panel-overlay.open{display:flex}
.panel{background:var(--surface);width:100%;max-width:680px;border-radius:var(--radius);padding:24px;max-height:90vh;overflow-y:auto}
.panel-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.panel-title{font-size:17px;font-weight:600}
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:500px){.summary-grid{grid-template-columns:1fr 1fr}}
.summary-card{background:var(--surface2);border-radius:var(--radius);padding:16px;border:1px solid var(--border);box-shadow:var(--shadow);transition:transform 0.2s}
.summary-card:hover{transform:translateY(-2px)}
.summary-card .val{font-size:22px;font-weight:600;font-family:var(--font-mono);letter-spacing:-0.5px}
.summary-card .lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.summary-card.green .val{color:var(--accent-mid)}
.summary-card.amber .val{color:var(--amber)}
.summary-card.red .val{color:var(--red)}
.month-select-row{display:flex;gap:10px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.month-select-row select, .month-select-row input{flex:1;min-width:120px;height:36px;padding:0 12px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;outline:none}
.export-row{display:flex;gap:8px;flex-wrap:wrap}
.btn-export{display:flex;align-items:center;gap:7px;padding:9px 16px;border:1px solid var(--border2);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-family:var(--font);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-export:hover{background:var(--surface2);border-color:var(--border2)}
.btn-export svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* COMPONENTES RESUMEN */
.client-list-container {
  margin-bottom: 16px;
  max-height: 130px;
  overflow-y: auto;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  padding: 6px;
}
.client-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  margin-bottom: 4px;
  transition: all .15s;
  font-size: 13px;
}
.client-item:last-child { margin-bottom: 0; }
.client-item:hover, .client-item.active {
  background: var(--surface);
}
.client-item.active {
  border-left: 3px solid var(--accent-mid);
  font-weight: 500;
}
.client-badges {
  display: flex;
  gap: 4px;
}
.client-badge-count {
  font-size: 10px;
  padding: 1px 5px;
  border-radius: 10px;
  font-weight: 500;
  font-family: var(--font-mono);
}
.res-preview-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.res-preview-item:last-child { border-bottom: none; }
.res-preview-left {
  display: flex;
  flex-direction: column;
}
.res-preview-title {
  font-weight: 500;
}
.res-preview-sub {
  font-size: 11px;
  color: var(--text2);
}

/* ALERT BANNER */
.alert-banner{background:var(--red-light);border:1px solid var(--red);border-radius:var(--radius-sm);padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px;color:var(--red)}
.alert-banner svg{width:18px;height:18px;stroke:var(--red);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:var(--bg);padding:10px 20px;border-radius:30px;font-size:13px;font-weight:500;z-index:999;transition:transform .25s ease;pointer-events:none;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}

/* INSTALL BANNER */
.install-banner{background:var(--accent-light);border:1px solid var(--accent-mid);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:13px}
.install-banner-text{color:var(--accent);font-weight:500}
.install-banner-text span{display:block;font-size:11px;font-weight:400;color:var(--accent-mid);margin-top:1px}
.btn-install{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer}
.btn-dismiss{background:none;border:none;cursor:pointer;color:var(--accent-mid);font-size:18px;padding:0 4px;line-height:1}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="logo">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
      </div>
      <div>
        <div class="header-title">Mis Trabajos</div>
        <div class="header-subtitle" id="header-date"></div>
      </div>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="manual-install-btn" style="display:none;" title="Instalar Aplicación">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      </button>
      <button class="icon-btn" onclick="openResumen()" title="Resumen mensual">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><path d="M14 17h7M17 14v7"/></svg>
      </button>
      <button class="icon-btn" onclick="toggleTheme()" title="Cambiar tema" id="theme-btn">
        <svg viewBox="0 0 24 24" id="theme-icon"><path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/></svg>
      </button>
    </div>
  </div>

  <div class="install-banner" id="install-banner" style="display:none">
    <div class="install-banner-text">
      Instalar app en tu celular
      <span>Accede más rápido desde tu pantalla de inicio</span>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="btn-install" id="btn-install-pwa">Instalar</button>
      <button class="btn-dismiss" onclick="document.getElementById('install-banner').style.display='none'">×</button>
    </div>
  </div>

  <div class="alert-banner" id="alert-banner" style="display:none">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
    <span id="alert-text"></span>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-value" id="s-total">0</div><div class="stat-label">Total</div></div>
    <div class="stat green"><div class="stat-value" id="s-paid">0</div><div class="stat-label">Pagados</div></div>
    <div class="stat amber"><div class="stat-value" id="s-inv">0</div><div class="stat-label">Con factura</div></div>
    <div class="stat red"><div class="stat-value" id="s-alert">0</div><div class="stat-label">Sin pago +30d</div></div>
  </div>

  <div class="toolbar">
    <input type="text" placeholder="Buscar proyecto o cliente…" id="search" oninput="render()">
    <select id="f-month" onchange="render()">
      <option value="">Todos los meses</option>
    </select>
    <select id="f-status" onchange="render()">
      <option value="">Todos los estados</option>
      <option value="pending">Sin cotización</option>
      <option value="quoted">Cotización enviada</option>
      <option value="invoiced">Factura enviada</option>
      <option value="paid">Pagado</option>
      <option value="unpaid">Factura sin pago +30d</option>
    </select>
    <button class="btn-new" onclick="openModal()">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo trabajo
    </button>
  </div>

  <div class="table-wrap">
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Proyecto</th>
            <th>Cliente</th>
            <th>Inicio</th>
            <th>Término</th>
            <th>Cotización</th>
            <th>Factura</th>
            <th>Pago</th>
            <th>Estado</th>
            <th>Nota</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <div id="empty" class="empty" style="display:none">
      <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      <p>No hay trabajos. ¡Agrega el primero!</p>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nuevo trabajo</div>
      <button class="modal-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="field">
      <label>Nombre del proyecto *</label>
      <input type="text" id="f-name" placeholder="Ej: 2da etapa Andromeda">
    </div>
    <div class="field">
      <label>Cliente / mandante</label>
      <input type="text" id="f-client" placeholder="Ej: Constructora ABC">
    </div>
    <div class="field-row">
      <div class="field">
        <label>Fecha de inicio</label>
        <input type="date" id="f-start">
      </div>
      <div class="field">
        <label>Fecha de término</label>
        <input type="date" id="f-end">
      </div>
    </div>
    <div class="field">
      <label>Nota / descripción</label>
      <textarea id="f-note" placeholder="Ej: Traslado de equipos a container"></textarea>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveWork()">Guardar</button>
    </div>
  </div>
</div>

<div class="panel-overlay" id="panel-overlay">
  <div class="panel">
    <div class="panel-header">
      <div class="panel-title">Resumen mensual y Reportes</div>
      <button class="modal-close" onclick="closeResumen()">
        <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="month-select-row">
      <select id="res-month" onchange="renderResumen()">
        <option value="">Todos los meses</option>
      </select>
      <select id="res-status" onchange="renderResumen()">
        <option value="">Todos los estados</option>
        <option value="paid">Pagados</option>
        <option value="unpaid">Sin pagar</option>
      </select>
      <input type="text" id="res-client" placeholder="Filtrar por cliente..." oninput="renderResumen()">
    </div>
    
    <label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-top:10px;margin-bottom:6px;">Clientes disponibles (Haz clic para filtrar):</label>
    <div class="client-list-container" id="res-client-list"></div>

    <label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-top:15px;margin-bottom:6px;">Métricas del reporte:</label>
    <div class="summary-grid" id="res-cards"></div>
    
    <label style="font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;display:block;margin-top:15px;margin-bottom:6px;">Detalle de Trabajos incluidos:</label>
    <div id="res-works-preview" style="max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg);margin-bottom:20px;"></div>

    <div class="export-row">
      <button class="btn-export" onclick="imprimirReporte()" style="border-color: var(--accent); color: #fff; background: var(--accent); width:100%; justify-content: center;">
        <svg viewBox="0 0 24 24" style="stroke: currentColor;"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Generar e Imprimir Reporte PDF
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx3jVhi8yYNydb4p-vxP8h6jyz7I3NL4C2PbfACjwDXhXXkbMio9MdpoCCTj-CcUSJ6fg/exec';
const KEY = 'trabajos_v3_cache';
let works = [];
let editId = null;
let deferredPrompt = null;
let saving = false;
let activeClientFilter = '';

function today() {
  const d = new Date();
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

function parseToIsoDate(input) {
  if (!input) return '';
  const s = String(input).trim();
  if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(s)) {
    const [d, m, y] = s.split('/');
    return `${y}-${m}-${d}`;
  }
  const d = new Date(s);
  if (!isNaN(d.getTime())) {
    const year = d.getUTCFullYear();
    const month = String(d.getUTCMonth() + 1).padStart(2, '0');
    const day = String(d.getUTCDate()).padStart(2, '0');
    if (year < 2024 || year > 2100) return '';
    return `${year}-${month}-${day}`;
  }
  return '';
}

function fmtDate(d){ 
  let iso = parseToIsoDate(d);
  if(!iso) return '—'; 
  const [y,m,day]=iso.split('-'); 
  return `${day}/${m}/${y}`; 
}

function fmtShort(d){ 
  let iso = parseToIsoDate(d);
  if(!iso) return ''; 
  const [y,m,day]=iso.split('-'); 
  return `${day}/${m}`; 
}

function monthKey(d){ 
  let iso = parseToIsoDate(d);
  return iso ? iso.slice(0,7) : '';
}

function monthLabel(k){ 
  if(!k) return ''; 
  const [y,m] = k.split('-'); 
  const names = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre']; 
  return `${names[parseInt(m)-1]} ${y}`; 
}

function daysSince(d){ 
  let iso = parseToIsoDate(d); 
  if(!iso) return 0; 
  return Math.floor((Date.now()-new Date(iso))/(1000*86400)); 
}

function esc(s){ 
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); 
}

function getStatus(w){ 
  if(w.paid) return 'paid'; 
  if(w.invoiced && daysSince(w.invoicedDate)>30) return 'unpaid'; 
  if(w.invoiced) return 'invoiced'; 
  if(w.quoted) return 'quoted'; 
  return 'pending'; 
}

function statusBadge(w){ 
  const s = getStatus(w); 
  const map = { 
    pending:['badge-pending','Sin cotización'], 
    quoted:['badge-quoted','Cotización enviada'], 
    invoiced:['badge-invoiced','Factura enviada'], 
    paid:['badge-paid','Pagado'], 
    unpaid:['badge-unpaid','Factura sin pago'] 
  }; 
  const [cls,lbl] = map[s]; 
  return `<span class="badge ${cls}">${lbl}</span>`; 
}

function showSyncStatus(msg, color='var(--text3)'){ 
  let el = document.getElementById('sync-status'); 
  if(!el){ 
    el=document.createElement('div'); 
    el.id='sync-status'; 
    el.style.cssText='position:fixed;bottom:70px;right:16px;font-size:11px;padding:5px 10px;background:var(--surface);border:1px solid var(--border);border-radius:20px;z-index:900;transition:opacity .3s'; 
    document.body.appendChild(el); 
  } 
  el.textContent=msg; 
  el.style.color=color; 
  el.style.opacity='1'; 
  clearTimeout(el._t); 
  el._t=setTimeout(()=>el.style.opacity='0',3000); 
}

async function load(){ 
  try { works = JSON.parse(localStorage.getItem(KEY)) || []; } catch(e){ works=[]; } 
  works = works.map(w => ({ 
    ...w, 
    id: Number(w.id), 
    start: parseToIsoDate(w.start), 
    end: parseToIsoDate(w.end), 
    quotedDate: parseToIsoDate(w.quotedDate), 
    invoicedDate: parseToIsoDate(w.invoicedDate), 
    paidDate: parseToIsoDate(w.paidDate) 
  })); 
  render(); 
  populateMonthFilters();
  showSyncStatus('Sincronizando…'); 
  try { 
    const res = await fetch(API+'?action=getAll'); 
    const data = await res.json(); 
    if(data.works && data.works.length){ 
      works = data.works.map(w => ({ 
        ...w, 
        id: Number(w.id),
        start: parseToIsoDate(w.start), 
        end: parseToIsoDate(w.end), 
        quoted: w.quoted==='true'||w.quoted===true,
        invoiced: w.invoiced==='true'||w.invoiced===true,
        paid: w.paid==='true'||w.paid===true,
        quotedDate: parseToIsoDate(w.quotedDate), 
        invoicedDate: parseToIsoDate(w.invoicedDate), 
        paidDate: parseToIsoDate(w.paidDate)
      })); 
      localStorage.setItem(KEY, JSON.stringify(works)); 
      render(); 
      populateMonthFilters(); 
      showSyncStatus('✓ Sincronizado con Google Sheets', 'var(--accent-mid)'); 
    } else {
      showSyncStatus('✓ Conectado', 'var(--accent-mid)');
    }
  } catch(e) { 
    showSyncStatus('Sin conexión — usando caché local', 'var(--amber)'); 
  } 
}

async function save() {
  localStorage.setItem(KEY, JSON.stringify(works));
  if(saving) return;
  saving = true;
  showSyncStatus('Guardando…');
  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'saveAll', works: works })
    });
    showSyncStatus('✓ Guardado en Drive', 'var(--accent-mid)');
  } catch(e) {
    showSyncStatus('Guardado local (sin internet)', 'var(--amber)');
  }
  saving = false;
}

function populateMonthFilters() {
  const fMonth = document.getElementById('f-month');
  const resMonth = document.getElementById('res-month');
  const val1 = fMonth.value;
  const val2 = resMonth.value;
  
  const months = new Set();
  works.forEach(w => {
    const k = monthKey(w.start || w.end);
    if(k) months.add(k);
  });
  
  const sortedMonths = Array.from(months).sort().reverse();
  let html = '<option value="">Todos los meses</option>';
  sortedMonths.forEach(k => {
    html += `<option value="${k}">${monthLabel(k)}</option>`;
  });
  
  fMonth.innerHTML = html;
  resMonth.innerHTML = html;
  fMonth.value = val1;
  resMonth.value = val2;
}

function render() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const query = document.getElementById('search').value.toLowerCase().trim();
  const fMonth = document.getElementById('f-month').value;
  const fStatus = document.getElementById('f-status').value;
  
  let totalCount = works.length;
  let paidCount = works.filter(w => w.paid).length;
  let invCount = works.filter(w => w.invoiced && !w.paid).length;
  let alertCount = works.filter(w => getStatus(w) === 'unpaid').length;
  
  document.getElementById('s-total').textContent = totalCount;
  document.getElementById('s-paid').textContent = paidCount;
  document.getElementById('s-inv').textContent = invCount;
  document.getElementById('s-alert').textContent = alertCount;
  
  let filtered = works.filter(w => {
    const mMatch = !fMonth || monthKey(w.start) === fMonth || monthKey(w.end) === fMonth;
    const sMatch = !fStatus || getStatus(w) === fStatus;
    const qMatch = !query || w.name.toLowerCase().includes(query) || 
                   (w.client && w.client.toLowerCase().includes(query)) ||
                   (w.note && w.note.toLowerCase().includes(query));
    return mMatch && sMatch && qMatch;
  });
  
  const banner = document.getElementById('alert-banner');
  if(alertCount > 0) {
    banner.style.display = 'flex';
    document.getElementById('alert-text').textContent = `${alertCount} factura${alertCount>1?'s':''} con más de 30 días sin pago. Revisa el estado de cobro.`;
  } else {
    banner.style.display = 'none';
  }

  if(filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';
  
  filtered.sort((a,b) => {
    const dA = a.start || '0000-00-00';
    const dB = b.start || '0000-00-00';
    return dB.localeCompare(dA);
  });
  
  let currentMonth = '';
  let html = '';
  
  filtered.forEach(w => {
    const m = monthKey(w.start) || monthKey(w.end) || 'Sin Fecha';
    if(m !== currentMonth) {
      currentMonth = m;
      const label = m === 'Sin Fecha' ? 'Sin Fecha' : monthLabel(m);
      html += `<tr class="month-row"><td colspan="10">${label}</td></tr>`;
    }
    
    const isUnpaidAlert = getStatus(w) === 'unpaid';
    const rowClass = isUnpaidAlert ? 'class="alert-row"' : '';
    
    html += `
      <tr ${rowClass}>
        <td class="td-project" style="cursor:pointer" onclick="openModal(${w.id})">${esc(w.name)}</td>
        <td class="td-client">${esc(w.client || '—')}</td>
        <td class="td-date">${fmtDate(w.start)}</td>
        <td class="td-date">${fmtDate(w.end)}</td>
        <td class="td-check">
          <div class="check-wrap">
            <input type="checkbox" ${w.quoted?'checked':''} onchange="toggleCheck(${w.id}, 'quoted')">
            <span class="check-date">${w.quoted ? fmtShort(w.quotedDate) : ''}</span>
          </div>
        </td>
        <td class="td-check">
          <div class="check-wrap">
            <input type="checkbox" ${w.invoiced?'checked':''} onchange="toggleCheck(${w.id}, 'invoiced')">
            <span class="check-date">${w.invoiced ? fmtShort(w.invoicedDate) : ''}</span>
          </div>
        </td>
        <td class="td-check">
          <div class="check-wrap">
            <input type="checkbox" ${w.paid?'checked':''} onchange="toggleCheck(${w.id}, 'paid')">
            <span class="check-date">${w.paid ? fmtShort(w.paidDate) : ''}</span>
          </div>
        </td>
        <td>${statusBadge(w)}</td>
        <td class="td-note" title="${esc(w.note)}">${esc(w.note || '—')}</td>
        <td class="td-actions">
          <button class="row-btn" onclick="openModal(${w.id})" title="Editar">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="row-btn del" onclick="deleteWork(${w.id})" title="Eliminar">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </button>
        </td>
      </tr>
    `;
  });
  
  tbody.innerHTML = html;
}

function openModal(id = null) {
  editId = id;
  const overlay = document.getElementById('modal-overlay');
  const title = document.getElementById('modal-title');
  
  if(id) {
    title.textContent = 'Editar trabajo';
    const w = works.find(item => Number(item.id) === Number(id));
    if(w) {
      document.getElementById('f-name').value = w.name || '';
      document.getElementById('f-client').value = w.client || '';
      document.getElementById('f-start').value = w.start || '';
      document.getElementById('f-end').value = w.end || '';
      document.getElementById('f-note').value = w.note || '';
    }
  } else {
    title.textContent = 'Nuevo trabajo';
    document.getElementById('f-name').value = '';
    document.getElementById('f-client').value = '';
    document.getElementById('f-start').value = today();
    document.getElementById('f-end').value = '';
    document.getElementById('f-note').value = '';
  }
  overlay.classList.add('open');
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editId = null;
}

async function saveWork() {
  const name = document.getElementById('f-name').value.trim();
  if(!name) { document.getElementById('f-name').focus(); return; }
  
  if(editId) {
    const w = works.find(item => Number(item.id) === Number(editId));
    if(w) {
      w.name = name;
      w.client = document.getElementById('f-client').value.trim();
      w.start = document.getElementById('f-start').value;
      w.end = document.getElementById('f-end').value;
      w.note = document.getElementById('f-note').value.trim();
      toast('Trabajo actualizado');
    }
  } else {
    works.push({
      id: Date.now(),
      name: name,
      client: document.getElementById('f-client').value.trim(),
      start: document.getElementById('f-start').value,
      end: document.getElementById('f-end').value,
      quoted: false,
      quotedDate: null,
      invoiced: false,
      invoicedDate: null,
      paid: false,
      paidDate: null,
      note: document.getElementById('f-note').value.trim()
    });
    toast('Trabajo agregado');
  }
  
  closeModal();
  render();
  populateMonthFilters();
  await save();
}

async function toggleCheck(id, field) {
  const w = works.find(item => Number(item.id) === Number(id));
  if(!w) return;
  w[field] = !w[field];
  const todayStr = today();
  if(field === 'quoted') w.quotedDate = w.quoted ? todayStr : null;
  if(field === 'invoiced') w.invoicedDate = w.invoiced ? todayStr : null;
  if(field === 'paid') w.paidDate = w.paid ? todayStr : null;
  
  render();
  toast(w[field] ? '✓ Guardado con fecha de hoy' : 'Desmarcado');
  await save();
}

async function deleteWork(id) {
  if(!confirm('¿Estás seguro de eliminar este trabajo?')) return;
  works = works.filter(w => Number(w.id) !== Number(id));
  render();
  populateMonthFilters();
  toast('Trabajo eliminado');
  await save();
}

function selectClientFilter(clientName) {
  const input = document.getElementById('res-client');
  if(activeClientFilter === clientName) {
    activeClientFilter = '';
    input.value = '';
  } else {
    activeClientFilter = clientName;
    input.value = clientName;
  }
  renderResumen();
}

function renderResumen() {
  const monthVal = document.getElementById('res-month').value;
  const statusVal = document.getElementById('res-status').value;
  const clientVal = document.getElementById('res-client').value.toLowerCase().trim();
  
  let filtered = works.filter(w => {
    const mMatch = !monthVal || monthKey(w.start) === monthVal || monthKey(w.end) === monthVal;
    let sMatch = true;
    if(statusVal === 'paid') sMatch = w.paid;
    if(statusVal === 'unpaid') sMatch = !w.paid;
    const cMatch = !clientVal || (w.client && w.client.toLowerCase().includes(clientVal));
    return mMatch && sMatch && cMatch;
  });
  
  const clientCounts = {};
  works.forEach(w => {
    if(w.client) {
      clientCounts[w.client] = (clientCounts[w.client] || 0) + 1;
    }
  });
  
  const clientListContainer = document.getElementById('res-client-list');
  let clientHtml = '';
  Object.keys(clientCounts).sort().forEach(c => {
    const isActive = clientVal === c.toLowerCase() ? 'active' : '';
    clientHtml += `
      <div class="client-item ${isActive}" onclick="selectClientFilter('${esc(c)}')">
        <span>${esc(c)}</span>
        <div class="client-badges">
          <span class="client-badge-count" style="background:var(--accent-light);color:var(--accent)">${clientCounts[c]}</span>
        </div>
      </div>
    `;
  });
  clientListContainer.innerHTML = clientHtml || '<div style="font-size:12px;color:var(--text3);padding:6px;">No hay clientes registrados</div>';

  const total = filtered.length;
  const pagados = filtered.filter(w => w.paid).length;
  const sinPagar = filtered.filter(w => !w.paid).length;
  const terminadas = filtered.filter(w => w.start && w.end).length;

  const cardsContainer = document.getElementById('res-cards');
  cardsContainer.innerHTML = `
    <div class="summary-card"><div class="val">${total}</div><div class="lbl">Trabajos</div></div>
    <div class="summary-card green"><div class="val">${pagados}</div><div class="lbl">Pagados</div></div>
    <div class="summary-card red"><div class="val">${sinPagar}</div><div class="lbl">Sin Pagar</div></div>
    <div class="summary-card amber"><div class="val">${terminadas}</div><div class="lbl">N° Terminadas</div></div>
  `;
  
  const previewContainer = document.getElementById('res-works-preview');
  let previewHtml = '';
  filtered.forEach(w => {
    const estLabel = w.paid ? 'Pagado' : 'No pagado';
    const estClass = w.paid ? 'color:var(--accent-mid)' : 'color:var(--red)';
    previewHtml += `
      <div class="res-preview-item">
        <div class="res-preview-left">
          <span class="res-preview-title">${esc(w.name)}</span>
          <span class="res-preview-sub">${esc(w.client || 'Sin cliente')} | ${fmtDate(w.start)} al ${fmtDate(w.end)}</span>
        </div>
        <span style="font-size:12px;font-weight:600;${estClass}">${estLabel}</span>
      </div>
    `;
  });
  previewContainer.innerHTML = previewHtml || '<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">Ningún trabajo coincide con los filtros</div>';
}

function openResumen() {
  document.getElementById('panel-overlay').classList.add('open');
  populateMonthFilters();
  renderResumen();
}

function closeResumen() {
  document.getElementById('panel-overlay').classList.remove('open');
}

function imprimirReporte() {
  const monthVal = document.getElementById('res-month').value;
  const statusVal = document.getElementById('res-status').value;
  const clientVal = document.getElementById('res-client').value.toLowerCase().trim();

  let filtered = works.filter(w => {
    const mMatch = !monthVal || monthKey(w.start) === monthVal || monthKey(w.end) === monthVal;
    let sMatch = true;
    if(statusVal === 'paid') sMatch = w.paid;
    if(statusVal === 'unpaid') sMatch = !w.paid;
    const cMatch = !clientVal || (w.client && w.client.toLowerCase().includes(clientVal));
    return mMatch && sMatch && cMatch;
  });

  if (filtered.length === 0) {
    alert('No hay datos disponibles para imprimir.');
    return;
  }

  const total     = filtered.length;
  const pagados   = filtered.filter(w => w.paid).length;
  const sinPagar  = filtered.filter(w => !w.paid).length;
  const terminadas = filtered.filter(w => w.start && w.end).length;

  // jsPDF (UMD) expone window.jspdf.jsPDF
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });

  const pageW = doc.internal.pageSize.getWidth();
  const margin = 14;
  let y = margin;

  // ── Encabezado ──────────────────────────────────────────────
  doc.setFontSize(16);
  doc.setTextColor(26, 107, 74); // verde acento
  doc.setFont('helvetica', 'bold');
  doc.text('REGISTRO DE TRABAJOS PAUL', margin, y);

  doc.setFontSize(9);
  doc.setTextColor(100);
  doc.setFont('helvetica', 'normal');
  doc.text(`Filtros: Mes [${monthVal ? monthLabel(monthVal) : 'Todos'}] | Cliente [${clientVal || 'Todos'}]`, margin, y + 6);

  const fecha = new Date().toLocaleDateString('es-CL');
  doc.text(`Fecha impresión: ${fecha}   Usuario: Paul Varona`, pageW - margin, y + 3, { align: 'right' });

  // línea separadora
  y += 12;
  doc.setDrawColor(34, 34, 34);
  doc.setLineWidth(0.5);
  doc.line(margin, y, pageW - margin, y);
  y += 6;

  // ── Métricas ─────────────────────────────────────────────────
  const boxW = 44;
  const boxH = 14;
  const metrics = [
    { label: 'TOTAL TRABAJOS', val: String(total),    color: [30, 30, 30] },
    { label: 'PAGADOS',        val: String(pagados),   color: [22, 163, 74]  },
    { label: 'SIN PAGAR',      val: String(sinPagar),  color: [220, 38, 38]  },
    { label: 'N° TERMINADAS',  val: String(terminadas),color: [217, 119, 6]  },
  ];
  metrics.forEach((m, i) => {
    const x = margin + i * (boxW + 4);
    doc.setFillColor(244, 244, 245);
    doc.setDrawColor(200);
    doc.roundedRect(x, y, boxW, boxH, 2, 2, 'FD');
    doc.setFontSize(14);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(...m.color);
    doc.text(m.val, x + boxW / 2, y + 7, { align: 'center' });
    doc.setFontSize(7);
    doc.setFont('helvetica', 'normal');
    doc.setTextColor(100);
    doc.text(m.label, x + boxW / 2, y + 12, { align: 'center' });
  });
  y += boxH + 6;

  // ── Tabla ────────────────────────────────────────────────────
  const rows = filtered.map((w, idx) => [
    idx + 1,
    w.name || '',
    w.client || '—',
    fmtDate(w.start),
    fmtDate(w.end),
    w.paid ? 'PAGADO' : 'NO PAGADO',
    w.note || '—'
  ]);

  doc.autoTable({
    startY: y,
    margin: { left: margin, right: margin },
    head: [['N°', 'Proyecto / Tarea', 'Cliente / Mandante', 'F. Inicio', 'F. Término', 'Estado', 'Nota / Descripción']],
    body: rows,
    styles: { fontSize: 9, cellPadding: 3, overflow: 'linebreak' },
    headStyles: { fillColor: [244, 244, 245], textColor: [60, 60, 60], fontStyle: 'bold', fontSize: 8 },
    columnStyles: {
      0: { cellWidth: 8,  halign: 'center' },
      1: { cellWidth: 52 },
      2: { cellWidth: 40 },
      3: { cellWidth: 22, halign: 'center' },
      4: { cellWidth: 22, halign: 'center' },
      5: { cellWidth: 24, halign: 'center',
           didParseCell: function(d) {
             if (d.section === 'body' && d.column.index === 5) {
               d.cell.styles.textColor = d.cell.raw === 'PAGADO' ? [22,163,74] : [220,38,38];
               d.cell.styles.fontStyle = 'bold';
             }
           }
         },
      6: { cellWidth: 'auto', fontSize: 8, textColor: [100, 100, 100] }
    },
    alternateRowStyles: { fillColor: [250, 250, 250] },
    didDrawPage: function(d) {
      // Pie de página con número
      doc.setFontSize(8);
      doc.setTextColor(150);
      doc.text(
        `Pág. ${d.pageNumber}`,
        pageW - margin,
        doc.internal.pageSize.getHeight() - 8,
        { align: 'right' }
      );
    }
  });

  // ── Guardar / descargar ──────────────────────────────────────
  const nombreArchivo = `reporte_trabajos_${fecha.replace(/\//g,'-')}.pdf`;
  doc.save(nombreArchivo);
}

function updateThemeIcon(theme){
  const icon = document.getElementById('theme-icon');
  if(!icon) return;
  if(theme === 'dark'){
    icon.innerHTML = '<path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-11.314l.707.707m11.314 11.314l.707.707M12 7a5 5 0 100 10 5 5 0 000-10z"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3a7 7 0 009.79 9.79z"/>';
  }
}

function toggleTheme(){
  const current = document.documentElement.getAttribute('data-theme') || 'light';
  const next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateThemeIcon(next);
}

function setDateHeader(){
  const el = document.getElementById('header-date');
  if(!el) return;
  const days = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const months = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const d = new Date();
  el.textContent = `${days[d.getDay()]}, ${d.getDate()} de ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function toast(msg){
  const el = document.getElementById('toast');
  if(!el) return;
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2500);
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if(banner) banner.style.display = 'flex';
  const manualBtn = document.getElementById('manual-install-btn');
  if(manualBtn) manualBtn.style.display = 'inline-flex';
});

async function triggerInstall() {
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  const {outcome} = await deferredPrompt.userChoice;
  deferredPrompt=null;
  document.getElementById('install-banner').style.display='none';
  const manualBtn = document.getElementById('manual-install-btn');
  if(manualBtn) manualBtn.style.display = 'none';
  if(outcome==='accepted') toast('¡App instalada!');
}

document.getElementById('btn-install-pwa').addEventListener('click', triggerInstall);
document.getElementById('manual-install-btn').addEventListener('click', triggerInstall);

document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeModal(); });
document.getElementById('panel-overlay').addEventListener('click',e=>{ if(e.target===e.currentTarget) closeResumen(); });

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){ closeModal(); closeResumen(); } });

const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');
document.documentElement.setAttribute('data-theme', savedTheme);
updateThemeIcon(savedTheme);
setDateHeader();
load();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
